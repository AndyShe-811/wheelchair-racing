<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殘奧競速輪椅：多人自訂賽道模擬器</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #eee; --accent: #00ff88; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        h1, h2, h3 { margin-top: 0; color: var(--accent); }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        .sidebar { flex: 1; min-width: 300px; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
        .main-view { flex: 2; min-width: 600px; display: flex; flex-direction: column; align-items: center; }
        
        /* 表單與按鈕樣式 */
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        input[type="text"], input[type="color"] { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #444; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 5px;}
        button:hover { background: #555; }
        .btn-primary { background: var(--accent); color: black; font-weight: bold; font-size: 18px; padding: 15px; }
        .btn-primary:hover { background: #00cc6a; }
        
        /* 畫布與列表清單 */
        canvas { background: #2a2a2a; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 100%; max-width: 800px; }
        .racer-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        .racer-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 14px;}
        .color-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-block; margin-right: 10px; vertical-align: middle; }
        
        /* 編輯與刪除小按鈕 */
        .action-btns { display: flex; gap: 5px; }
        .btn-small { padding: 5px 8px; font-size: 12px; width: auto; margin-top: 0; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-edit:hover { background: #e67e22; }
        .btn-del { background: #e74c3c; color: white; }
        .btn-del:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="panel">
            <h2>🗺️ 賽道編輯器</h2>
            <div class="control-group">
                <label>直線長度 (X軸半徑): <span id="val-rx">300</span></label>
                <input type="range" id="map-rx" min="150" max="350" value="300">
            </div>
            <div class="control-group">
                <label>彎道寬度 (Y軸半徑): <span id="val-ry">120</span></label>
                <input type="range" id="map-ry" min="50" max="180" value="120">
            </div>
        </div>

        <div class="panel">
            <h2 id="garage-title">🛠️ 新增參賽選手</h2>
            <input type="text" id="r-name" placeholder="選手名稱 (例: 選手A)">
            
            <div class="control-group">
                <label>後輪傾角 (0-20°): <span id="val-cam">10</span></label>
                <input type="range" id="r-cam" min="0" max="20" value="10">
            </div>
            <div class="control-group">
                <label>重心高度 (1-10): <span id="val-cg">5</span></label>
                <input type="range" id="r-cg" min="1" max="10" value="5">
            </div>
            
            <label>代表顏色:</label>
            <input type="color" id="r-color" value="#00ff88">
            <button id="add-racer">➕ 加入比賽陣容</button>
            <button id="cancel-edit" style="display:none; background:#555;">取消編輯</button>
        </div>

        <div class="panel">
            <h3>📋 參賽名單 (<span id="racer-count">0</span>)</h3>
            <ul class="racer-list" id="racer-list">
                </ul>
            <button id="clear-racers" style="background:#e74c3c; margin-top:10px;">🗑️ 清空所有名單</button>
        </div>
    </div>

    <div class="main-view">
        <canvas id="track" width="800" height="400"></canvas>
        <br>
        <button id="start-race" class="btn-primary">🏁 開始模擬比賽</button>
        <h3 id="status-log" style="margin-top: 15px; color: var(--accent);">準備就緒...</h3>
    </div>

<script>
    // 取得 DOM 元素
    const canvas = document.getElementById('track');
    const ctx = canvas.getContext('2d');
    const mapRxInput = document.getElementById('map-rx');
    const mapRyInput = document.getElementById('map-ry');
    const statusLog = document.getElementById('status-log');
    const racerListEl = document.getElementById('racer-list');
    const addBtn = document.getElementById('add-racer');
    const cancelEditBtn = document.getElementById('cancel-edit');
    const garageTitle = document.getElementById('garage-title');

    // UI 數值連動
    document.getElementById('map-rx').oninput = (e) => { document.getElementById('val-rx').innerText = e.target.value; drawTrack(); }
    document.getElementById('map-ry').oninput = (e) => { document.getElementById('val-ry').innerText = e.target.value; drawTrack(); }
    document.getElementById('r-cam').oninput = (e) => document.getElementById('val-cam').innerText = e.target.value;
    document.getElementById('r-cg').oninput = (e) => document.getElementById('val-cg').innerText = e.target.value;

    // 系統狀態變數
    let racers = [];
    let crashMarks = []; 
    let isRacing = false;
    let editingIndex = -1; // -1 代表「新增模式」，大於等於 0 代表「編輯某位選手」

    // --- 繪圖系統 ---
    function drawTrack() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const rx = parseInt(mapRxInput.value);
        const ry = parseInt(mapRyInput.value);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.lineWidth = 40;
        ctx.strokeStyle = '#444';
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(cx + rx - 20, cy);
        ctx.lineTo(cx + rx + 20, cy);
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#fff';
        ctx.stroke();
    }

    function drawWheelchair(x, y, angle, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillStyle = color;
        ctx.fillRect(-15, -4, 30, 8); 
        ctx.beginPath(); ctx.arc(15, 0, 4, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = '#fff';
        ctx.fillRect(-10, -12, 16, 4); 
        ctx.fillRect(-10, 8, 16, 4);   
        ctx.restore();
    }

    function drawCrashes() {
        crashMarks.forEach(mark => {
            ctx.font = "20px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("💥", mark.x, mark.y);
            ctx.font = "12px sans-serif";
            ctx.fillStyle = mark.color;
            ctx.fillText(mark.name, mark.x, mark.y + 15);
        });
    }

    // --- 選手名單管理與編輯邏輯 ---
    function updateRacerList() {
        document.getElementById('racer-count').innerText = racers.length;
        racerListEl.innerHTML = '';
        racers.forEach((r, index) => {
            racerListEl.innerHTML += `
                <li class="racer-item">
                    <div>
                        <span class="color-dot" style="background:${r.color};"></span>
                        <span style="font-weight:bold;">${r.name}</span><br>
                        <span style="color:#aaa; font-size: 12px;">傾角: ${r.camber}° | 重心: ${r.cg}</span>
                    </div>
                    <div class="action-btns">
                        <button class="btn-small btn-edit" onclick="startEdit(${index})" ${isRacing ? 'disabled' : ''}>✏️</button>
                        <button class="btn-small btn-del" onclick="deleteRacer(${index})" ${isRacing ? 'disabled' : ''}>❌</button>
                    </div>
                </li>`;
        });
    }

    // 啟動編輯模式
    window.startEdit = function(index) {
        if(isRacing) return;
        editingIndex = index;
        const r = racers[index];
        
        // 將該選手的資料填回表單
        document.getElementById('r-name').value = r.name;
        document.getElementById('r-cam').value = r.camber;
        document.getElementById('val-cam').innerText = r.camber;
        document.getElementById('r-cg').value = r.cg;
        document.getElementById('val-cg').innerText = r.cg;
        document.getElementById('r-color').value = r.color;

        // 改變 UI 狀態
        garageTitle.innerText = "✏️ 編輯選手參數";
        addBtn.innerText = "💾 儲存修改";
        addBtn.style.background = "#f39c12"; // 橘色警告色
        cancelEditBtn.style.display = "block"; // 顯示取消按鈕
    };

    // 取消編輯模式
    function cancelEdit() {
        editingIndex = -1;
        garageTitle.innerText = "🛠️ 新增參賽選手";
        addBtn.innerText = "➕ 加入比賽陣容";
        addBtn.style.background = "#444";
        cancelEditBtn.style.display = "none";
        
        // 清空表單
        document.getElementById('r-name').value = "";
    }
    cancelEditBtn.addEventListener('click', cancelEdit);

    // 刪除單一選手
    window.deleteRacer = function(index) {
        if(isRacing) return;
        racers.splice(index, 1);
        if(editingIndex === index) cancelEdit(); // 如果正在編輯被刪除的人，就取消編輯
        updateRacerList();
    };

    // 送出表單 (新增 或 儲存修改)
    addBtn.addEventListener('click', () => {
        const name = document.getElementById('r-name').value || `選手 ${racers.length + 1}`;
        const camber = parseFloat(document.getElementById('r-cam').value);
        const cg = parseFloat(document.getElementById('r-cg').value);
        const color = document.getElementById('r-color').value;

        if (editingIndex === -1) {
            // 新增模式
            racers.push({ name, camber, cg, color, progress: 0, crashed: false });
        } else {
            // 編輯模式
            racers[editingIndex] = { name, camber, cg, color, progress: 0, crashed: false };
            cancelEdit(); // 儲存後自動回到新增模式
        }
        updateRacerList();
    });

    // 清空所有名單
    document.getElementById('clear-racers').addEventListener('click', () => {
        if(isRacing) return;
        racers = []; 
        cancelEdit();
        updateRacerList(); 
        drawTrack();
    });

    // --- 核心物理與賽車引擎 ---
    document.getElementById('start-race').addEventListener('click', () => {
        if (isRacing || racers.length === 0) {
            if(racers.length === 0) alert("請先在左側新增選手！");
            return;
        }
        
        isRacing = true;
        updateRacerList(); // 觸發更新來鎖定按鈕
        crashMarks = []; 
        racers.forEach(r => { r.progress = 0; r.crashed = false; }); 
        statusLog.style.color = "white";
        statusLog.innerText = "比賽進行中...";
        
        const rx = parseInt(mapRxInput.value);
        const ry = parseInt(mapRyInput.value);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        function animate() {
            if (!isRacing) return;
            drawTrack();
            drawCrashes(); 

            let allFinishedOrCrashed = true;
            let currentLeader = null;

            racers.forEach(p => {
                if (p.crashed || p.progress >= Math.PI * 2) {
                    if (p.progress < Math.PI * 2 && !p.crashed) allFinishedOrCrashed = false;
                    return; 
                }

                allFinishedOrCrashed = false; 
                const x = cx + rx * Math.cos(p.progress);
                const y = cy + ry * Math.sin(p.progress);
                const angle = Math.atan2(ry * Math.cos(p.progress), -rx * Math.sin(p.progress));

                const inCurve = Math.abs(Math.cos(p.progress)) > 0.6; 

                let speed = 0;
                if (inCurve) {
                    speed = 0.015 + (p.camber * 0.0005) - (p.cg * 0.0002);
                    const curveDifficulty = 100 / ry; 
                    const stability = (p.camber - p.cg) - (curveDifficulty * 8); 
                    
                    if (stability < -10) { 
                        p.crashed = true;
                        crashMarks.push({ x, y, color: p.color, name: p.name });
                        return; 
                    }
                } else {
                    speed = 0.015 - (p.camber * 0.0003) + (p.cg * 0.0005);
                }

                p.progress += speed;
                drawWheelchair(x, y, angle, p.color);
                
                if (p.progress >= Math.PI * 2 && !currentLeader) {
                    currentLeader = p;
                }
            });

            if (allFinishedOrCrashed) {
                isRacing = false;
                updateRacerList(); // 解鎖按鈕
                if (currentLeader) {
                    statusLog.style.color = currentLeader.color;
                    statusLog.innerText = `🏆 比賽結束！冠軍是：${currentLeader.name}`;
                } else {
                    statusLog.style.color = "#e74c3c";
                    statusLog.innerText = "💥 全軍覆沒！所有人都翻車了，請調整賽道或參數！";
                }
                return;
            }
            requestAnimationFrame(animate);
        }
        animate();
    });

    // 初始載入
    drawTrack();
    // 預先塞入三名不同流派的選手供測試
    racers.push({ name: "穩健過彎型", camber: 15, cg: 3, color: "#00ff88", progress: 0, crashed: false });
    racers.push({ name: "直線加速型", camber: 2, cg: 8, color: "#3498db", progress: 0, crashed: false });
    racers.push({ name: "極端危險型", camber: 0, cg: 10, color: "#e74c3c", progress: 0, crashed: false });
    updateRacerList();

</script>
</body>
</html>
