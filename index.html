<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殘奧競速輪椅：手繪賽道物理模擬器</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #eee; --accent: #00ff88; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        h1, h2, h3 { margin-top: 0; color: var(--accent); }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        .sidebar { flex: 1; min-width: 300px; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
        .main-view { flex: 2; min-width: 600px; display: flex; flex-direction: column; align-items: center; }
        
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        input[type="text"], input[type="color"] { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #444; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 5px; font-weight: bold;}
        button:hover { background: #555; }
        .btn-primary { background: var(--accent); color: black; font-size: 18px; padding: 15px; }
        .btn-primary:hover { background: #00cc6a; }
        
        canvas { background: #2a2a2a; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 100%; max-width: 800px; cursor: crosshair; }
        .drawing-mode { border: 3px dashed var(--accent); }
        
        .racer-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        .racer-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 14px;}
        .color-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-block; margin-right: 10px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="panel">
            <h2>🗺️ 手繪賽道工作室</h2>
            <p style="font-size: 14px; color: #aaa;">點擊下方按鈕後，在右側畫布上按住滑鼠拖曳，畫出你的專屬賽道！放開滑鼠會自動閉合起終點。</p>
            <button id="btn-draw" style="background: #3498db;">✍️ 開始手繪新賽道</button>
            <button id="btn-default" style="background: #555;">🔄 恢復預設橢圓形</button>
        </div>

        <div class="panel">
            <h2 id="garage-title">🛠️ 新增參賽選手</h2>
            <input type="text" id="r-name" placeholder="選手名稱 (例: 選手A)">
            <div class="control-group">
                <label>後輪傾角 (0-20°): <span id="val-cam">10</span></label>
                <input type="range" id="r-cam" min="0" max="20" value="10">
            </div>
            <div class="control-group">
                <label>重心高度 (1-10): <span id="val-cg">5</span></label>
                <input type="range" id="r-cg" min="1" max="10" value="5">
            </div>
            <label>代表顏色:</label>
            <input type="color" id="r-color" value="#00ff88">
            <button id="add-racer">➕ 加入比賽陣容</button>
        </div>

        <div class="panel">
            <h3>📋 參賽名單 (<span id="racer-count">0</span>)</h3>
            <ul class="racer-list" id="racer-list"></ul>
        </div>
    </div>

    <div class="main-view">
        <canvas id="track" width="800" height="400"></canvas>
        <br>
        <button id="start-race" class="btn-primary">🏁 在這條賽道上開始比賽</button>
        <h3 id="status-log" style="margin-top: 15px; color: var(--accent);">請畫出賽道或直接開始比賽！</h3>
    </div>

<script>
    const canvas = document.getElementById('track');
    const ctx = canvas.getContext('2d');
    const statusLog = document.getElementById('status-log');
    const racerListEl = document.getElementById('racer-list');

    document.getElementById('r-cam').oninput = (e) => document.getElementById('val-cam').innerText = e.target.value;
    document.getElementById('r-cg').oninput = (e) => document.getElementById('val-cg').innerText = e.target.value;

    let racers = [];
    let crashMarks = []; 
    let isRacing = false;
    let trackPoints = []; // 儲存賽道所有座標點
    let isDrawingMode = false;
    let isMouseDown = false;

    // --- 繪圖工具箱邏輯 ---
    
    // 生成預設橢圓賽道
    function createDefaultTrack() {
        trackPoints = [];
        const cx = 400, cy = 200, rx = 300, ry = 120;
        // 採樣 200 個點來組成橢圓
        for (let i = 0; i < 200; i++) {
            const angle = (i / 200) * Math.PI * 2 + (Math.PI / 2); // 從正下方起跑
            trackPoints.push({
                x: cx + rx * Math.cos(angle),
                y: cy + ry * Math.sin(angle)
            });
        }
        processTrackPhysics();
        drawTrack();
    }

    // 計算賽道每個點的角度與彎道銳利度 (核心物理升級)
    function processTrackPhysics() {
        if (trackPoints.length < 10) return; // 點太少不構成賽道

        for (let i = 0; i < trackPoints.length; i++) {
            const pCurrent = trackPoints[i];
            const pNext = trackPoints[(i + 1) % trackPoints.length]; // 下一個點
            const pPrev = trackPoints[(i - 1 + trackPoints.length) % trackPoints.length]; // 上一個點

            // 計算前進方向的角度 (Tangent Angle)
            pCurrent.angle = Math.atan2(pNext.y - pCurrent.y, pNext.x - pCurrent.x);

            // 計算彎曲程度 (Curvature)：前後角度差的絕對值
            let angleDiff = Math.abs(Math.atan2(pNext.y - pCurrent.y, pNext.x - pCurrent.x) - 
                                     Math.atan2(pCurrent.y - pPrev.y, pCurrent.x - pPrev.x));
            if (angleDiff > Math.PI) angleDiff = (Math.PI * 2) - angleDiff;
            
            pCurrent.sharpness = angleDiff; // 這個數值越大，代表彎越急
        }
    }

    // 畫出目前的賽道
    function drawTrack() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (trackPoints.length === 0) {
            ctx.fillStyle = '#555'; ctx.font = "24px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("點擊左側「✍️ 開始手繪新賽道」來畫圖", canvas.width/2, canvas.height/2);
            return;
        }

        ctx.beginPath();
        ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
        for (let i = 1; i < trackPoints.length; i++) {
            ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
        }
        ctx.closePath(); // 閉合迴圈
        ctx.lineWidth = 40;
        ctx.strokeStyle = '#444';
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.stroke();

        // 畫起跑線 (陣列的第 0 個點)
        const p0 = trackPoints[0];
        ctx.beginPath();
        ctx.arc(p0.x, p0.y, 5, 0, Math.PI*2);
        ctx.fillStyle = 'white';
        ctx.fill();
    }

    // --- 滑鼠手繪事件 ---
    document.getElementById('btn-draw').addEventListener('click', () => {
        isDrawingMode = true;
        isRacing = false;
        trackPoints = [];
        canvas.classList.add('drawing-mode');
        statusLog.style.color = "#3498db";
        statusLog.innerText = "✍️ 繪圖模式：請在上方黑色區域按住滑鼠畫出一圈賽道";
        drawTrack();
    });

    document.getElementById('btn-default').addEventListener('click', () => {
        isDrawingMode = false;
        canvas.classList.remove('drawing-mode');
        statusLog.innerText = "已載入標準田徑賽道";
        createDefaultTrack();
    });

    canvas.addEventListener('mousedown', (e) => {
        if (!isDrawingMode) return;
        isMouseDown = true;
        trackPoints = []; // 開始新的一筆
        addPoint(e);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawingMode || !isMouseDown) return;
        // 為了避免滑鼠採樣點太密，限制距離
        const lastP = trackPoints[trackPoints.length - 1];
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const dist = Math.hypot(mx - lastP.x, my - lastP.y);
        
        if (dist > 15) { // 每移動 15px 紀錄一個點
            addPoint(e);
            drawTrack(); // 即時預覽線條
        }
    });

    canvas.addEventListener('mouseup', finishDrawing);
    canvas.addEventListener('mouseleave', () => { if(isMouseDown) finishDrawing(); });

    function addPoint(e) {
        const rect = canvas.getBoundingClientRect();
        trackPoints.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
    }

    function finishDrawing() {
        if (!isDrawingMode || !isMouseDown) return;
        isMouseDown = false;
        isDrawingMode = false;
        canvas.classList.remove('drawing-mode');
        
        if (trackPoints.length < 10) {
            statusLog.innerText = "賽道太短了！請重新畫一次完整的圈。";
            createDefaultTrack();
            return;
        }

        processTrackPhysics(); // 計算轉彎銳利度
        drawTrack();
        statusLog.style.color = "var(--accent)";
        statusLog.innerText = "✅ 賽道生成完畢！可以開始比賽了。";
    }

    // --- 賽車引擎與物理邏輯 ---
    
    function drawWheelchair(x, y, angle, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillStyle = color;
        ctx.fillRect(-15, -4, 30, 8); 
        ctx.beginPath(); ctx.arc(15, 0, 4, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = '#fff';
        ctx.fillRect(-10, -12, 16, 4); 
        ctx.fillRect(-10, 8, 16, 4);   
        ctx.restore();
    }

    function drawCrashes() {
        crashMarks.forEach(mark => {
            ctx.font = "20px sans-serif"; ctx.textAlign = "center"; ctx.fillText("💥", mark.x, mark.y);
            ctx.font = "12px sans-serif"; ctx.fillStyle = mark.color; ctx.fillText(mark.name, mark.x, mark.y + 15);
        });
    }

    function updateRacerList() {
        document.getElementById('racer-count').innerText = racers.length;
        racerListEl.innerHTML = '';
        racers.forEach((r, index) => {
            racerListEl.innerHTML += `
                <li class="racer-item">
                    <div>
                        <span class="color-dot" style="background:${r.color};"></span>
                        <span style="font-weight:bold;">${r.name}</span><br>
                        <span style="color:#aaa; font-size: 12px;">傾角: ${r.camber}° | 重心: ${r.cg}</span>
                    </div>
                </li>`;
        });
    }

    document.getElementById('add-racer').addEventListener('click', () => {
        const name = document.getElementById('r-name').value || `選手 ${racers.length + 1}`;
        const camber = parseFloat(document.getElementById('r-cam').value);
        const cg = parseFloat(document.getElementById('r-cg').value);
        const color = document.getElementById('r-color').value;
        racers.push({ name, camber, cg, color, progress: 0, crashed: false });
        updateRacerList();
    });

    document.getElementById('start-race').addEventListener('click', () => {
        if (isRacing || racers.length === 0) return;
        if (trackPoints.length === 0) { alert("請先畫賽道！"); return; }
        
        isRacing = true;
        crashMarks = []; 
        racers.forEach(r => { r.progress = 0; r.crashed = false; }); // progress 現在代表走過幾個座標點
        statusLog.style.color = "white";
        statusLog.innerText = "比賽進行中...";

        let currentLeader = null;
        const finishIndex = trackPoints.length - 1;

        function animate() {
            if (!isRacing) return;
            drawTrack();
            drawCrashes(); 

            let allFinishedOrCrashed = true;

            racers.forEach(p => {
                if (p.crashed || p.progress >= finishIndex) return; 
                allFinishedOrCrashed = false; 

                const pointIndex = Math.floor(p.progress);
                const currentPoint = trackPoints[pointIndex];
                
                // 動態物理判定：讀取這個座標點的「彎道銳利度 (sharpness)」
                let speedStep = 0;
                
                if (currentPoint.sharpness > 0.05) { 
                    // 這是彎道：銳利度越高，離心力越可怕
                    speedStep = 1.5 + (p.camber * 0.05) - (p.cg * 0.02);
                    
                    const curveDifficulty = currentPoint.sharpness * 100; // 將角度差放大為難度系數
                    const stability = (p.camber - p.cg) - (curveDifficulty * 1.5); 
                    
                    if (stability < -5) { // 翻車門檻
                        p.crashed = true;
                        crashMarks.push({ x: currentPoint.x, y: currentPoint.y, color: p.color, name: p.name });
                        return; 
                    }
                } else {
                    // 這是直道
                    speedStep = 1.5 - (p.camber * 0.03) + (p.cg * 0.05);
                }

                p.progress += speedStep;
                
                if (p.progress >= finishIndex && !currentLeader) currentLeader = p;
            });

            // 繪圖
            racers.forEach(p => {
                if (p.crashed) return; 
                const drawIdx = Math.min(Math.floor(p.progress), finishIndex); 
                const pt = trackPoints[drawIdx];
                drawWheelchair(pt.x, pt.y, pt.angle, p.color);
            });

            if (allFinishedOrCrashed) {
                isRacing = false;
                if (currentLeader) {
                    statusLog.style.color = currentLeader.color;
                    statusLog.innerText = `🏆 比賽結束！冠軍是：${currentLeader.name}`;
                } else {
                    statusLog.style.color = "#e74c3c";
                    statusLog.innerText = "💥 全軍覆沒！所有人都翻車了，你的賽道可能太極端了！";
                }
                return;
            }
            requestAnimationFrame(animate);
        }
        animate();
    });

    // 初始化
    createDefaultTrack();
    racers.push({ name: "穩健過彎型", camber: 15, cg: 3, color: "#00ff88", progress: 0, crashed: false });
    racers.push({ name: "直線加速型", camber: 2, cg: 8, color: "#3498db", progress: 0, crashed: false });
    racers.push({ name: "極端危險型", camber: 0, cg: 10, color: "#e74c3c", progress: 0, crashed: false });
    updateRacerList();

</script>
</body>
</html>
